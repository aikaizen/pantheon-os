system: Pantheon OS
channels:
  - id: ai-principal-cli
    name: Principal CLI
    kind: cli_session
    platform: local
    deployment: promptengines
    status: active
    access_mode: control
    participants:
      - ai-principal
    notes: Direct CLI operating surface used by the principal.

  - id: dzambhala-telegram
    name: Dzambhala Telegram
    kind: telegram_chat
    platform: telegram
    deployment: promptengines
    status: active
    access_mode: message
    participants:
      - ai-principal
      - dzambhala
    endpoint:
      bot: '@Dzambhala_daka_bot'
      chat_id: null
    notes: Existing dedicated Telegram surface for Dzambhala.

  - id: promptengines-host-overseer-cli
    name: Host Overseer CLI
    kind: cli_session
    platform: local
    deployment: promptengines
    status: active
    access_mode: control
    participants:
      - ai-principal
      - promptengines-host-overseer
    notes: Host-side overseer session for operating Dockerized Hermes runtimes.
