system: Pantheon OS
controllers:
  - id: promptengines-host-overseer
    name: PromptEngines Host Overseer
    type: overseer-agent
    deployment: promptengines
    status: active
    host_id: promptengines-local-macbook
    placement: host-machine
    agent_system: hermes-operator
    access_level: host
    controls:
      - docker_runtime_management
      - runtime_health_monitoring
      - runtime_restart
      - runtime_routing
      - log_inspection
      - model_configuration
    manages:
      - promptengines-hermes-primary
    approval_required_for:
      - destructive_restart
      - production_model_swap
      - secret_changes
    notes: Required host-level overseer agent operating the Dockerized Hermes runtime on the machine.
